services:
  traefik-kop:
    image: "ghcr.io/jittering/traefik-kop:latest"
    name: traefik-kop
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - "REDIS_ADDR=${REDIS_ADDR}"
      - "REDIS_PASS=${REDIS_PASS}"
      - "BIND_IP=${BIND_IP}"
